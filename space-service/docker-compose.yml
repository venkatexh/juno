services:
  postgres:
    image: postgres
    container_name: space-postgres
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: space-db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: always
    ports:
      - 8000:8080