services:
  postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: juno-auth-svc-db
    ports:
      - "5433:5432"
    volumes:
      - ./data/data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: always
    ports:
      - 8001:8080